<div class="mt-3 rounded-md border border-amber-200 bg-amber-50 p-3 text-sm text-amber-950">
  {% if reveal.ok %}
  <div class="font-semibold">Key value for {{ env_var_name }}</div>
  <div class="mt-1 text-xs">This displays your API key on screen. Do not reveal it while screen sharing.</div>
  <input class="field font-mono" type="password" value="{{ reveal.message }}" readonly>
  <div class="mt-2 flex gap-2">
    <button class="table-button" type="button" onclick="const input=this.closest('div').previousElementSibling; input.type = input.type === 'password' ? 'text' : 'password';">Show / Hide</button>
    <button class="table-button" type="button" onclick="navigator.clipboard && navigator.clipboard.writeText(this.closest('div').previousElementSibling.value);">Copy key</button>
    <button class="table-button" type="button" onclick="this.closest('.mt-3').remove();">Hide again</button>
  </div>
  {% else %}
  <div class="font-semibold">{{ reveal.message }}</div>
  {% endif %}
</div>
