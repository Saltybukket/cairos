[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cairos"
version = "0.2.0"
description = "Context-Aware Intelligent Runtime Operating Shell"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "CAIROS Developer" }]
license = { text = "MIT" }

[project.scripts]
cairos = "cairos.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["cairos*"]
